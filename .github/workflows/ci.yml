name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        working-directory: freecad-plugin
        run: pip install -e ".[dev]"
      - name: Lint
        working-directory: freecad-plugin
        run: ruff check .
      - name: Test
        working-directory: freecad-plugin
        run: pytest

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        working-directory: itwin-connector
        run: npm ci
      - name: Lint
        working-directory: itwin-connector
        run: npm run lint
      - name: Build
        working-directory: itwin-connector
        run: npm run build
      - name: Test
        working-directory: itwin-connector
        run: npm test
